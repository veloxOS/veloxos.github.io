<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>MUN Assistant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Times New Roman", serif;
  background: #0b0f19;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#mun-window {
  width: 420px;
  height: 85vh;
  background: rgba(17, 24, 39, 0.97);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

#mun-header {
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: #fff;
  padding: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

#lottie-bot {
  width: 34px;
  height: 34px;
}

#mun-messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

.msg {
  margin: 6px 0;
  padding: 10px 12px;
  border-radius: 12px;
  max-width: 85%;
  font-size: 14px;
}

.user {
  background: #2563eb;
  color: #fff;
  margin-left: auto;
}

.bot {
  background: #1f2937;
  color: #e5e7eb;
}

#mun-input-area {
  display: flex;
  border-top: 1px solid #374151;
}

#mun-input {
  flex: 1;
  border: none;
  padding: 12px;
  background: #111827;
  color: #e5e7eb;
}

#mun-input:focus { outline: none; }

#mun-input-area button {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 0 16px;
  cursor: pointer;
}

#mun-quick {
  padding: 6px;
  border-top: 1px solid #374151;
}

#mun-quick button {
  margin: 2px;
  padding: 6px 8px;
  font-size: 11px;
  border: none;
  background: #111827;
  color: #93c5fd;
  border-radius: 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<div id="mun-window">

  <div id="mun-header">
    <div id="lottie-bot"></div>
    MUN Assistant
  </div>

  <div id="mun-messages"></div>

  <div id="mun-quick">
    <button onclick="quickQuery('agendas')">Agendas</button>
    <button onclick="quickQuery('portfolios')">Portfolios</button>
    <button onclick="quickQuery('dates')">Dates</button>
    <button onclick="quickQuery('bg')">BGs</button>
    <button onclick="quickQuery('catering')">Catering</button>
  </div>

  <div id="mun-input-area">
    <input id="mun-input" placeholder="Ask something..." />
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script>

/* LOTTIE */
lottie.loadAnimation({
  container: document.getElementById('lottie-bot'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: 'https://assets2.lottiefiles.com/packages/lf20_tno6cg2w.json'
});

/* CONFIG */
const SHEET_ID = "1dNDh4jRjCOUMbbf0ncK6Id5Hn52UMNwLC1VHCBnP4rY";
const CONTACT = "Please contact the Chargé d’Affaires, Saanvi Kumar at 9606940530 on WhatsApp.";

const cache = {};
const CACHE_TIME = 300000;
let failCount = 0;

/* FETCH */
async function getSheet(name) {
  try {
    const now = Date.now();
    if (cache[name] && now - cache[name].time < CACHE_TIME)
      return cache[name].data;

    const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/${name}`);
    const data = await res.json();

    cache[name] = { data, time: now };
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

/* DEFINITIONS (CRITICAL FIX) */
function definitions(q) {
  q = q.toLowerCase();

  if (q.includes("what is mun"))
    return "Model United Nations (MUN) is a simulation of UN committees where delegates represent countries and debate global issues.";

  if (q.includes("mun meaning"))
    return "Model United Nations (MUN) is a simulation of UN committees.";

  if (q.includes("what is committee"))
    return "A committee is a simulated body where delegates discuss an agenda.";

  if (q.includes("what is delegate"))
    return "A delegate represents a country or stakeholder.";

  if (q.includes("what is portfolio"))
    return "A portfolio is the assigned country or role.";

  return null;
}

/* FAQ MATCHING (IMPROVED) */
async function faqMatch(q) {
  q = q.toLowerCase().replace(/[^\w\s]/g, "");

  const data = await getSheet("FAQs");

  let best = null;
  let bestScore = 0;

  for (let row of data) {
    const keys = (row.Keywords || "").toLowerCase().split(",");
    let score = 0;

    for (let k of keys) {
      k = k.trim();
      if (!k) continue;

      const words = k.split(" ");
      let match = 0;

      for (let w of words) {
        if (q.includes(w)) match++;
      }

      if (match > 0) score += match / words.length;
    }

    if (score > bestScore) {
      bestScore = score;
      best = row;
    }
  }

  if (best && bestScore > 0.5) return best.Answer;
  return null;
}

/* GENERAL */
function general(q) {
  q = q.toLowerCase();

  if (q.match(/contact|whatsapp|number/)) return CONTACT;
  if (q.includes("what can you do")) return "Agendas, portfolios, dates, BGs, catering info.";
  if (q.match(/hi|hello|hey/)) return "Ask about MUN details.";

  return null;
}

/* INTENT */
function intent(q) {
  q = q.toLowerCase();

  if (q.includes("agenda")) return "agenda";
  if (q.includes("portfolio")) return "portfolio";
  if (q.includes("date")) return "date";
  if (q.includes("bg") || q.includes("guide")) return "bg";

  if (
    q.includes("catering") ||
    q.includes("food") ||
    q.includes("meal") ||
    q.includes("lunch") ||
    q.includes("snack")
  ) return "catering";

  if (q.includes("eligible")) return "eligibility";

  return null;
}

/* COMMITTEES */
const map = {
  unsc: "UNSC",
  unhrc: "UNHRC",
  unodc: "UNODC",
  eu: "EU",
  ls: "Lok Sabha",
  ccc: "CCC",
  ipc: "IPC"
};

function detectCommittee(q) {
  q = q.toLowerCase();
  for (let k in map) if (q.includes(k)) return map[k];
  return null;
}

/* AGENDA */
async function allAgendas() {
  const d = await getSheet("Agendas");
  return d.length
    ? d.map(r => `<b>${r.Committee}</b>: ${r.Agenda}`).join("<br><br>")
    : "No agendas.";
}

async function oneAgenda(c) {
  const d = await getSheet("Agendas");
  const r = d.find(x => x.Committee?.toLowerCase() === c.toLowerCase());
  return r?.Agenda || "Not found.";
}

/* OTHER */
async function matrix() {
  const d = await getSheet("Matrices");
  return d[0]?.Link || "#";
}

async function bg() {
  const d1 = await getSheet("Dates");
  const d2 = await getSheet("Guides");

  const row = d1.find(x => x.Event?.toLowerCase().includes("background"));
  return {
    date: row?.Date || "TBA",
    link: d2[0]?.Link || "#"
  };
}

/* CATERING */
function cateringAnswer(q) {
  q = q.toLowerCase();

  if (q.includes("veg")) return "Vegetarian meals available.";
  if (q.includes("non veg")) return "Non-vegetarian meals available.";
  if (q.includes("lunch")) return "Lunch will be provided.";
  if (q.includes("snack")) return "Snacks during breaks.";
  return "Catering includes meals and refreshments.";
}

/* ELIGIBILITY */
function eligibility(q) {
  q = q.toLowerCase();

  if (q.includes("delegate") && q.match(/9|10/))
    return "Eligible as Delegate.";

  if (q.includes("delegation")) {
    const n = parseInt(q.match(/\d+/));
    if (!n) return "Specify size.";
    return n >= 15 ? "Eligible." : "Minimum 15 required.";
  }

  return "Specify class or delegation size.";
}

/* MAIN */
async function handleQuery(q) {

  const def = definitions(q);
  if (def) return def;

  const faq = await faqMatch(q);
  if (faq) return faq;

  const g = general(q);
  if (g) return g;

  const i = intent(q);

  if (!i) {
    failCount++;
    if (failCount >= 3) return CONTACT;
    return "Sorry, didn't get you.";
  }

  failCount = 0;

  if (i === "agenda") {
    const c = detectCommittee(q);
    return c ? `<b>${c}</b>: ${await oneAgenda(c)}` : await allAgendas();
  }

  if (i === "portfolio") return `Matrix: <a href="${await matrix()}" target="_blank">Open</a>`;

  if (i === "bg") {
    const x = await bg();
    return `BGs by ${x.date}. <a href="${x.link}" target="_blank">Open</a>`;
  }

  if (i === "date") {
    const d = await getSheet("Dates");
    return d.map(x => `${x.Event}: ${x.Date}`).join("<br>");
  }

  if (i === "catering") return cateringAnswer(q);

  if (i === "eligibility") return eligibility(q);

  return "Sorry, didn't get you.";
}

/* UI */
const messages = document.getElementById("mun-messages");

function add(text, user=false) {
  const d = document.createElement("div");
  d.className = "msg " + (user ? "user" : "bot");
  d.innerHTML = text;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("mun-input");
  const q = input.value.trim();
  if (!q) return;

  add(q, true);
  input.value = "";

  add("...", false);
  messages.lastChild.innerHTML = await handleQuery(q);
}

document.getElementById("mun-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

async function quickQuery(q) {
  add(q, true);
  add("...", false);
  messages.lastChild.innerHTML = await handleQuery(q);
}

</script>

</body>
</html>
