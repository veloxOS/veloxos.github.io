<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MUN Assistant</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Times New Roman", serif;
  background: #0b0f19;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#mun-window {
  width: 420px;
  height: 85vh;
  background: rgba(17, 24, 39, 0.97);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

#mun-header {
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: #fff;
  padding: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

#lottie-bot {
  width: 34px;
  height: 34px;
}

#mun-messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

.msg {
  margin: 6px 0;
  padding: 10px 12px;
  border-radius: 12px;
  max-width: 85%;
  font-size: 14px;
  line-height: 1.5;
}

.user {
  background: #2563eb;
  color: #fff;
  margin-left: auto;
}

.bot {
  background: #1f2937;
  color: #e5e7eb;
}

#mun-input-area {
  display: flex;
  border-top: 1px solid #374151;
}

#mun-input {
  flex: 1;
  border: none;
  padding: 12px;
  background: #111827;
  color: #e5e7eb;
}

#mun-input:focus { outline: none; }

#mun-input-area button {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 0 16px;
  cursor: pointer;
}

#mun-quick {
  padding: 6px;
  border-top: 1px solid #374151;
}

#mun-quick button {
  margin: 2px;
  padding: 6px 8px;
  font-size: 11px;
  border: none;
  background: #111827;
  color: #93c5fd;
  border-radius: 6px;
  cursor: pointer;
}

hr.bot-sep {
  border: 0;
  border-top: 1px solid #374151;
  margin: 10px 0;
}
</style>
</head>

<body>

<div id="mun-window">
  <div id="mun-header">
    <div id="lottie-bot"></div>
    MUN Assistant
  </div>

  <div id="mun-messages"></div>

  <div id="mun-quick">
    <button onclick="quickQuery('agendas')">Agendas</button>
    <button onclick="quickQuery('portfolios')">Portfolios</button>
    <button onclick="quickQuery('dates')">Dates</button>
    <button onclick="quickQuery('bg')">BGs</button>
    <button onclick="quickQuery('catering')">Catering</button>
    <button onclick="quickQuery('faqs')">FAQs</button>
  </div>

  <div id="mun-input-area">
    <input id="mun-input" placeholder="Ask something..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
lottie.loadAnimation({
  container: document.getElementById('lottie-bot'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: 'https://assets2.lottiefiles.com/packages/lf20_tno6cg2w.json'
});

const SHEET_ID = "1dNDh4jRjCOUMbbf0ncK6Id5Hn52UMNwLC1VHCBnP4rY";
const CONTACT = "Please contact the Chargé d’Affaires, Saanvi Kumar at 9606940530 on WhatsApp.";

const cache = {};
const CACHE_TIME = 300000;
let sorryCount = 0;

/* FETCHING DATA */
async function getSheet(name) {
  try {
    const now = Date.now();
    if (cache[name] && now - cache[name].time < CACHE_TIME) return cache[name].data;
    const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/${name}`);
    const data = await res.json();
    cache[name] = { data, time: now };
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

async function firstLink(sheetName) {
  const d = await getSheet(sheetName);
  if (!d || !d.length) return "";
  const row = d[0];
  return (row.Link || row.link || Object.values(row).find(v => typeof v === "string" && v.startsWith("http")) || "").trim();
}

/* INTENT DETECTION (MULTIPLE) */
function detectIntents(q) {
  q = q.toLowerCase();
  let intents = [];
  if (q.includes("agenda")) intents.push("agenda");
  if (q.match(/portfolio|matrix|matrices/)) intents.push("portfolio");
  if (q.includes("date")) intents.push("date");
  if (q.match(/bg|guide/)) intents.push("bg");
  if (q.match(/catering|food|meal|lunch|snack/)) intents.push("catering");
  if (q.includes("eligible")) intents.push("eligibility");
  if (q.includes("faq")) intents.push("faqs");
  return intents;
}

/* SUB-HANDLERS */
function definitions(q) {
  q = q.toLowerCase();
  if (q.includes("what is mun")) return "Model United Nations is a simulation of UN committees.";
  if (q.includes("use of mun") || q.includes("why mun")) return "MUN helps develop leadership, public speaking, and negotiation skills.";
  return null;
}

async function faqMatch(q) {
  q = q.toLowerCase().replace(/[^\w\s]/g, "");
  const data = await getSheet("FAQs");
  let best = null; let bestScore = 0;
  for (let row of data) {
    const keys = (row.Keywords || "").toLowerCase().split(",");
    let score = 0;
    for (let k of keys) {
      k = k.trim(); if (!k) continue;
      const words = k.split(" ");
      let match = 0;
      for (let w of words) { if (q.includes(w)) match++; }
      if (match > 0) score += match / words.length;
    }
    if (score > bestScore) { bestScore = score; best = row; }
  }
  return (best && bestScore > 0.5) ? best.Answer : null;
}

const committeeMap = { unsc: "UNSC", unhrc: "UNHRC", unodc: "UNODC", eu: "EU", ls: "Lok Sabha", ccc: "CCC", ipc: "IPC" };
function detectCommittee(q) {
  q = q.toLowerCase();
  for (let k in committeeMap) if (q.includes(k)) return committeeMap[k];
  return null;
}

/* MAIN HANDLER - MULTI QUESTION SUPPORT */
async function handleQuery(q) {
  let results = [];
  const queryLower = q.toLowerCase();

  // 1. Check Hardcoded Definitions/Greetings
  const def = definitions(queryLower);
  if (def) results.push(def);
  
  if (queryLower.match(/hi|hello|hey/)) results.push("Hello! How can I help you with the MUN today?");

  // 2. Detect and process specific intents
  const intents = detectIntents(queryLower);
  for (let i of intents) {
    if (i === "agenda") {
      const c = detectCommittee(queryLower);
      if (c) {
        const d = await getSheet("Agendas");
        const r = d.find(x => x.Committee?.toLowerCase() === c.toLowerCase());
        results.push(`<b>${c}</b>: ${r?.Agenda || "Not found."}`);
      } else {
        const d = await getSheet("Agendas");
        results.push(d.length ? d.map(r => `<b>${r.Committee}</b>: ${r.Agenda}`).join("<br><br>") : "No agendas.");
      }
    }
    if (i === "portfolio") {
      const link = await firstLink("Matrices");
      results.push(link ? `Committee Matrix: <a href="${link}" target="_blank">Open here</a>` : "Matrix not available.");
    }
    if (i === "bg") {
      const d = await getSheet("Dates");
      const row = d.find(x => (x.Event || "").toLowerCase().includes("background"));
      const link = await firstLink("Guides");
      results.push(`BGs will be out by ${row?.Date || "TBA"}. <a href="${link}" target="_blank">View Guides</a>`);
    }
    if (i === "date") {
      const d = await getSheet("Dates");
      results.push(d.map(x => `${x.Event}: ${x.Date}`).join("<br>"));
    }
    if (i === "catering") {
      results.push("Vegetarian Lunch shall be provided");
    }
    if (i === "faqs") {
      const d = await getSheet("FAQs-Display");
      if (d.length) results.push(d.map(r => Object.values(r).filter(v => v).join("<br>")).join("<br><br>"));
    }
  }

  // 3. Fallback to FAQ search if no intents were triggered
  if (results.length === 0) {
    const faq = await faqMatch(queryLower);
    if (faq) results.push(faq);
  }

  // 4. Return formatted results
  if (results.length > 0) {
    sorryCount = 0;
    // Join multiple answers with a line separator
    return results.join("<hr class='bot-sep'>");
  }

  sorryCount++;
  if (sorryCount >= 3) { sorryCount = 0; return CONTACT; }
  return "I'm not sure about that. You can ask about agendas, dates, BGs, catering and other MUN related topics! I can answer conducive MUN questions";
}

/* UI LOGIC */
const messages = document.getElementById("mun-messages");

function add(text, user=false) {
  const d = document.createElement("div");
  d.className = "msg " + (user ? "user" : "bot");
  d.innerHTML = text;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
  return d;
}

async function sendMessage() {
  const input = document.getElementById("mun-input");
  const q = input.value.trim();
  if (!q) return;

  add(q, true);
  input.value = "";

  const loading = add("...");
  loading.innerHTML = await handleQuery(q);
}

document.getElementById("mun-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

async function quickQuery(q) {
  add(q, true);
  const loading = add("...");
  loading.innerHTML = await handleQuery(q);
}
</script>

</body>
</html>
